<header
    class="sticky top-0 z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md border-b border-white/40 dark:border-slate-800/40 shadow-sm transition-colors duration-300">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">

        <div [routerLink]="['/']" class="flex items-center space-x-2 hover:cursor-pointer">
            <span class="material-icons text-blue-600 text-3xl">directions_car</span>
            <span class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Your<span
                    class="text-blue-600">Dream</span>Car</span>
        </div>

        <!-- <nav class="hidden lg:flex space-x-6 text-sm font-medium text-slate-700 dark:text-slate-300">
            <a href="#" class="hover:text-blue-600 transition">New Cars</a>
            <a href="#" class="hover:text-blue-600 transition">Used Cars</a>
        </nav> -->

        <div class="flex items-center space-x-4">

            <button (click)="themeService.toggleTheme()"
                class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:scale-105 transition active:scale-95 flex items-center justify-center">
                <span class="material-icons text-xl">
                    {{ themeService.darkMode() ? 'light_mode' : 'dark_mode' }}
                </span>
            </button>

            <div class="relative">
                @if (loggedUser; as user) {
                <button (click)="toggleDropdown()"
                    class="flex items-center space-x-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-900 dark:text-white px-3 py-2 rounded-full transition focus:outline-none border border-slate-200 dark:border-slate-700">
                    <div
                        class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xs">
                        {{ user.name.charAt(0) }}
                    </div>
                    <span class="text-sm font-semibold hidden sm:block">Contul meu</span>
                    <span class="material-icons text-sm transition-transform duration-200"
                        [ngClass]="{'rotate-180': isDropdownOpen()}">expand_more</span>
                </button>

                @if (isDropdownOpen()) {
                <div class="fixed inset-0 z-40" (click)="closeDropdown()"></div>

                <div
                    class="absolute right-0 mt-3 w-56 bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 py-2 z-50 animate-[fadeIn_0.15s_ease-out]">

                    <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800 mb-2">
                        <p class="text-sm font-bold text-slate-900 dark:text-white">Salut, {{ user.name }}</p>
                        <p class="text-xs text-slate-500 truncate">{{ user.email }}</p>
                    </div>

                    <a [routerLink]="['/profil']" (click)="closeDropdown()"
                        class="flex items-center space-x-3 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <span class="material-icons text-slate-400 text-lg">person</span>
                        <span>Setări profil</span>
                    </a>

                    @if(isAdmin()) {
                    <a [routerLink]="['/dashboard']" (click)="closeDropdown()"
                        class="flex items-center space-x-3 px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <span class="material-icons text-slate-400 text-lg">settings_applications</span>
                        <span>Panou Administrator</span>
                    </a>
                    }

                    <hr class="border-slate-100 dark:border-slate-800 my-2">

                    <button (click)="logout()"
                        class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/10 transition">
                        <span class="material-icons text-lg">logout</span>
                        <span class="font-semibold">Ieși din cont</span>
                    </button>
                </div>
                }
                }
                @else {
                <button (click)="openLoginModal()"
                    class="bg-blue-600/90 hover:bg-blue-600 text-white font-medium text-sm px-5 py-2.5 rounded-full transition flex items-center space-x-1 shadow-sm">
                    <span class="material-icons text-sm">login</span>
                    <span>Autentifică-te</span>
                </button>
                }
            </div>

        </div>
    </div>
</header>

@if (!authService.isTokenValid()) {
<app-login-modal [isLoginModalOpen]="isLoginModalOpen" (close)="closeLoginModal()" />
}
