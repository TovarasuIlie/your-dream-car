<!-- Randează modalul DOAR dacă input-ul primit este true -->
@if (isLoginModalOpen) {
    <!-- Fundal semi-transparent (Backdrop) -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]"
         (click)="closeModal()">
         
        <!-- Cardul Modalului -->
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl relative overflow-hidden animate-[slideUp_0.3s_ease-out]"
             (click)="$event.stopPropagation()">
            
            <!-- Buton "X" pentru închidere -->
            <button (click)="closeModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-700 dark:hover:text-white transition-colors focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="p-8">
                <!-- Header Modal -->
                <div class="text-center mb-8 mt-2">
                    <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2">Bine ai revenit</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">Introdu datele pentru a accesa contul.</p>
                </div>

                <app-alert [message]="errorMessage()" [type]="'error'" />

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
                    
                    <!-- Câmp Email -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Adresă de Email</label>
                        <input 
                            type="email" 
                            formControlName="email" 
                            placeholder="nume@exemplu.com"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all"
                            [ngClass]="{'border-red-500 focus:ring-red-500': f['email'].invalid && f['email'].touched}">
                        
                        @if (f['email'].invalid && f['email'].touched) {
                            <p class="text-red-500 text-xs mt-1.5 font-medium">Email valid obligatoriu.</p>
                        }
                    </div>

                    <!-- Câmp Parolă -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">Parolă</label>
                            <a href="#" class="text-xs font-semibold text-blue-600 dark:text-blue-400 hover:underline">Ai uitat parola?</a>
                        </div>
                        
                        <div class="relative">
                            <input 
                                [type]="showPassword() ? 'text' : 'password'" 
                                formControlName="password" 
                                placeholder="Introdu parola"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all pr-12"
                                [ngClass]="{'border-red-500 focus:ring-red-500': f['password'].invalid && f['password'].touched}">
                            
                            <button type="button" (click)="togglePasswordVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none">
                                @if (showPassword()) {
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                                } @else {
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                }
                            </button>
                        </div>

                        @if (f['password'].invalid && f['password'].touched) {
                            <p class="text-red-500 text-xs mt-1.5 font-medium">Parola este obligatorie.</p>
                        }
                    </div>

                    <!-- Buton Submit -->
                    <button 
                        type="submit" 
                        [disabled]="isLoading()"
                        class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 transition-all active:scale-[0.98] mt-4 flex justify-center items-center gap-2 disabled:opacity-70 disabled:active:scale-100">
                        
                        @if (isLoading()) {
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span>Se conectează...</span>
                        } @else {
                            <span>Intră în cont</span>
                        }
                    </button>
                </form>

                <p class="text-center text-slate-500 dark:text-slate-400 mt-8 text-sm">
                    Nu ai cont încă? 
                    <a [routerLink]="['/inregistrare-cont']" (click)="closeModal()" class="text-blue-600 dark:text-blue-400 font-bold hover:underline transition-colors">
                        Creează unul
                    </a>
                </p>
            </div>
        </div>
    </div>
}
